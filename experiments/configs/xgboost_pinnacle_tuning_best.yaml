experiment:
  name: xgboost_pinnacle_tuning
  tags:
  - xgboost
  - pinnacle
  - oddsapi
  - injuries
  - tuning
  description: 'Hyperparameter tuning for Pinnacle CLV prediction with tabular + injury
    features. ~800 events from Odds API (2025-03 to 2026-02), US bookmaker set.

    '
training:
  strategy_type: xgboost_line_movement
  data:
    start_date: '2025-03-01'
    end_date: '2026-02-28'
    test_split: 0.15
    validation_split: 0.0
    random_seed: 42
    shuffle: false
    data_source: oddsapi
    min_snapshots: null
    use_kfold: true
    cv_method: walk_forward
    n_folds: 5
    kfold_shuffle: false
    window_type: expanding
    min_train_events: 300
    max_train_events: null
    val_step_events: 80
  model:
    n_estimators: 400
    max_depth: 2
    min_child_weight: 47
    learning_rate: 0.14452728004892418
    gamma: 0.7559752147341086
    subsample: 0.5
    colsample_bytree: 0.7
    colsample_bylevel: 1.0
    colsample_bynode: 1.0
    reg_alpha: 0.14689619688622574
    reg_lambda: 4.36624122200828
    objective: reg:squarederror
    random_state: 42
    n_jobs: -1
    early_stopping_rounds: 15
  features:
    adapter: xgboost
    sharp_bookmakers:
    - pinnacle
    retail_bookmakers:
    - fanduel
    - draftkings
    - betmgm
    markets:
    - h2h
    outcome: home
    closing_tier: closing
    sampling:
      strategy: tier
      decision_tier: pregame
      min_hours: 3.0
      max_hours: 12.0
      max_samples_per_event: 5
    lookback_hours: null
    timesteps: null
    normalize: false
    feature_groups:
    - tabular
    - injuries
    movement_threshold: 0.005
    pm_velocity_window_hours: 2.0
    pm_price_tolerance_minutes: 30
    variance_threshold: 0.0
    target_type: devigged_bookmaker
    target_bookmaker: pinnacle
  feature_selection:
    enabled: false
    method: ensemble
    feature_names: null
    min_correlation: 0.02
    min_variance: 0.01
    n_ensemble_models: 3
    ensemble_seeds:
    - 42
    - 123
    - 456
    model_types:
    - xgboost
    - random_forest
    - extra_trees
    hybrid_filter_weight: 0.3
  min_predicted_movement: 0.02
  movement_confidence_scale: 5.0
  base_confidence: 0.52
  output_path: models
  model_name: null
tuning:
  n_trials: 100
  timeout: null
  direction: minimize
  metric: val_mse
  pruner: median
  sampler: tpe
  search_spaces:
    n_estimators:
      type: int
      low: 50.0
      high: 400.0
      step: 50.0
      log: false
      choices: null
    max_depth:
      type: int
      low: 2.0
      high: 6.0
      step: null
      log: false
      choices: null
    learning_rate:
      type: float
      low: 0.01
      high: 0.3
      step: null
      log: true
      choices: null
    min_child_weight:
      type: int
      low: 5.0
      high: 50.0
      step: null
      log: false
      choices: null
    subsample:
      type: float
      low: 0.5
      high: 1.0
      step: 0.1
      log: false
      choices: null
    colsample_bytree:
      type: float
      low: 0.5
      high: 1.0
      step: 0.1
      log: false
      choices: null
    gamma:
      type: float
      low: 0.0
      high: 1.0
      step: null
      log: false
      choices: null
    reg_alpha:
      type: float
      low: 0.0
      high: 2.0
      step: null
      log: false
      choices: null
    reg_lambda:
      type: float
      low: 0.5
      high: 5.0
      step: null
      log: false
      choices: null
tracking: null
