experiment:
  name: xgboost_bet365_injuries
  tags:
  - xgboost
  - bet365
  - oddsportal
  - injuries
  description: >
    CLV prediction with injury features added to bet365 baseline. ~5.7K games
    with injury coverage across 5 NBA seasons (2021-2026), UK bookmaker set.
    Tabular + injury impact-weighted features.
training:
  strategy_type: xgboost_line_movement
  data:
    start_date: '2021-10-01'
    end_date: '2026-02-27'
    data_source: oddsportal
    test_split: 0.15
    validation_split: 0.0
    random_seed: 42
    shuffle: false
    use_kfold: true
    cv_method: walk_forward
    min_train_events: 2000
    val_step_events: 200
    kfold_shuffle: false
  model:
    n_estimators: 150
    max_depth: 3
    min_child_weight: 10
    learning_rate: 0.05
    gamma: 0.1
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 2.0
    objective: reg:squarederror
    random_state: 42
    n_jobs: -1
    early_stopping_rounds: 15
  features:
    adapter: xgboost
    sharp_bookmakers:
    - bet365
    retail_bookmakers:
    - betway
    - betfred
    - bwin
    markets:
    - h2h
    outcome: home
    closing_tier: closing
    feature_groups:
    - tabular
    - injuries
    target_type: devigged_bookmaker
    target_bookmaker: bet365
    sampling:
      strategy: tier
      decision_tier: sharp
  feature_selection:
    enabled: false
  output_path: models
tracking: null
