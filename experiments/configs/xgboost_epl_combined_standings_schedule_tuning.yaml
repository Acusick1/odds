experiment:
  name: xgboost_epl_combined_standings_schedule_tuning
  tags:
  - xgboost
  - epl
  - combined
  - tuning
  - football
  - pinnacle
  - standings
  - epl_schedule
  description: >
    EPL CLV prediction with combined data, Pinnacle sharp reference, standings,
    and schedule/rest features. Tests whether schedule features add signal on
    top of the current best (tabular + standings).

training:
  strategy_type: xgboost_line_movement
  data:
    start_date: '2021-08-01'
    end_date: '2026-03-10'
    sport_key: soccer_epl
    data_source: null
    test_split: 0.0
    validation_split: 0.0
    random_seed: 42
    shuffle: false
    use_kfold: true
    cv_method: walk_forward
    kfold_shuffle: false
    window_type: sliding
    min_train_events: 380
    max_train_events: 380
    val_step_events: 50
  model:
    n_estimators: 200
    max_depth: 3
    min_child_weight: 20
    learning_rate: 0.1
    gamma: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    colsample_bylevel: 1.0
    colsample_bynode: 1.0
    reg_alpha: 0.5
    reg_lambda: 1.5
    objective: reg:squarederror
    random_state: 42
    n_jobs: 1
    early_stopping_rounds: 15
  features:
    adapter: xgboost
    sharp_bookmakers:
    - pinnacle
    retail_bookmakers:
    - bet365
    - betway
    - betfred
    - bwin
    markets:
    - h2h
    outcome: home
    closing_tier: closing
    closing_source_priority:
    - football_data_uk
    sampling:
      strategy: tier
      decision_tier: sharp
      min_hours: 3.0
      max_hours: 12.0
      max_samples_per_event: 5
    lookback_hours: null
    timesteps: null
    normalize: false
    feature_groups:
    - tabular
    - standings
    - epl_schedule
    movement_threshold: 0.005
    pm_velocity_window_hours: 2.0
    pm_price_tolerance_minutes: 30
    variance_threshold: 0.0
    target_type: devigged_bookmaker
    target_bookmaker: bet365
  feature_selection:
    enabled: false
    method: ensemble
    feature_names: null
    min_correlation: 0.02
    min_variance: 0.01
    n_ensemble_models: 3
    ensemble_seeds:
    - 42
    - 123
    - 456
    model_types:
    - xgboost
    - random_forest
    - extra_trees
    hybrid_filter_weight: 0.3
  min_predicted_movement: 0.02
  movement_confidence_scale: 5.0
  base_confidence: 0.52
  output_path: models
  model_name: null
tuning:
  n_trials: 100
  timeout: null
  direction: minimize
  metric: val_mse
  pruner: median
  sampler: tpe
  search_spaces:
    n_estimators:
      type: int
      low: 50.0
      high: 400.0
      step: 50.0
      log: false
      choices: null
    max_depth:
      type: int
      low: 2.0
      high: 6.0
      step: null
      log: false
      choices: null
    learning_rate:
      type: float
      low: 0.01
      high: 0.3
      step: null
      log: true
      choices: null
    min_child_weight:
      type: int
      low: 5.0
      high: 50.0
      step: null
      log: false
      choices: null
    subsample:
      type: float
      low: 0.5
      high: 1.0
      step: 0.1
      log: false
      choices: null
    colsample_bytree:
      type: float
      low: 0.5
      high: 1.0
      step: 0.1
      log: false
      choices: null
    gamma:
      type: float
      low: 0.0
      high: 1.0
      step: null
      log: false
      choices: null
    reg_alpha:
      type: float
      low: 0.0
      high: 2.0
      step: null
      log: false
      choices: null
    reg_lambda:
      type: float
      low: 0.5
      high: 5.0
      step: null
      log: false
      choices: null
tracking: null
