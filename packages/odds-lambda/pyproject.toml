[project]
name = "odds-lambda"
version = "0.1.0"
description = "Lambda runtime code for betting odds pipeline"
authors = [{name = "Andrew"}]
requires-python = ">=3.12"
dependencies = [
    "odds-core",
    "odds-analytics",
    "aiohttp>=3.9.0",
    "apscheduler==4.0.0a6",
    "tenacity>=8.2.3",
    "boto3>=1.34.0",
    "alembic>=1.13.0",
    "nba_api>=1.1.0",
    "nbainjuries>=1.1.1",
    "playwright>=1.58.0",
    "requests>=2.31.0",
    "fake-useragent>=2.2.0",
]

[tool.uv.sources]
odds-core = { workspace = true }
odds-analytics = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["odds_lambda"]
